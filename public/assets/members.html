<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>部員一覧 | 欠席管理</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <style>
        body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; margin: 0; background: #f4f6fa; }
        .header { display: flex; align-items: center; border-bottom: 2px solid #222; padding: 24px 32px 12px 32px; background: #fff; }
        .dashboard-title { font-size: 2em; font-weight: bold; letter-spacing: 2px; }
        .nav { display: flex; align-items: center; gap: 32px; border-bottom: 1.5px solid #222; padding: 12px 32px; background: #fff; font-size: 1.1em; }
        .nav a { text-decoration: none; color: #222; font-weight: 500; padding: 4px 10px; border-radius: 4px; transition: background 0.2s; }
        .nav a:hover { background: #e0e0e0; }
        .nav span { font-weight: bold; }
        .nav button { margin-left: 16px; padding: 6px 18px; font-size: 1em; border-radius: 4px; border: 1px solid #222; background: #fff; cursor: pointer; transition: background 0.2s; }
        .nav button:hover { background: #222; color: #fff; }
        .main { padding: 32px; max-width: 1200px; margin: 0 auto; }
        .members-title { font-size: 2.2em; font-weight: bold; margin-bottom: 8px; }
        .members-desc { color: #666; margin-bottom: 32px; }
        .members-table { width: 100%; border-collapse: collapse; background: #fff; }
        .members-table th, .members-table td { border: 1px solid #bbb; padding: 16px 12px; text-align: left; font-size: 1.1em; }
        .members-table th { background: #f5f5f5; font-weight: bold; }
        .members-table tr:nth-child(even) { background: #fafbfc; }
        @media (max-width: 900px) {
            .main { padding: 12px; }
            .members-table th, .members-table td { padding: 8px 4px; font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="dashboard-title">欠席管理</span>
    </div>
    <div class="nav">
        <a href="/assets/dashboard.html">ダッシュボード</a>
        <a href="/assets/members.html">部員一覧</a>
        <a href="/assets/settings.html">設定</a>
        <span style="margin-left:auto;">ユーザー名</span>
        <button>ログアウト</button>
    </div>
    <div class="main">
        <div class="members-title">部員一覧</div>
        <div class="members-desc">登録されている全部員の情報と欠席状況を確認できます</div>
        <table class="members-table">
            <thead>
                <tr>
                    <th>部員名</th>
                    <th>学年</th>
                    <th>欠席回数</th>
                    <th>補足</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>田中　太郎</td>
                    <td>1回</td>
                    <td>1回</td>
                    <td>1</td>
                </tr>
                <tr>
                    <td>山田　花子</td>
                    <td>2回</td>
                    <td>2回</td>
                    <td>2</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
