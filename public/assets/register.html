<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>遅刻・欠席登録 | 欠席管理</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <style>
        body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; margin: 0; background: #f4f6fa; }
        .header { display: flex; align-items: center; border-bottom: 2px solid #222; padding: 24px 32px 12px 32px; background: #fff; }
        .dashboard-title { font-size: 2em; font-weight: bold; letter-spacing: 2px; }
        .nav { display: flex; align-items: center; gap: 32px; border-bottom: 1.5px solid #222; padding: 12px 32px; background: #fff; font-size: 1.1em; }
        .nav a { text-decoration: none; color: #222; font-weight: 500; padding: 4px 10px; border-radius: 4px; transition: background 0.2s; }
        .nav a:hover { background: #e0e0e0; }
        .nav span { font-weight: bold; }
        .nav button { margin-left: 16px; padding: 6px 18px; font-size: 1em; border-radius: 4px; border: 1px solid #222; background: #fff; cursor: pointer; transition: background 0.2s; }
        .nav button:hover { background: #222; color: #fff; }
        .main { padding: 32px; max-width: 900px; margin: 0 auto; }
        .form-title { font-size: 2.2em; font-weight: bold; margin-bottom: 8px; }
        .form-desc { color: #666; margin-bottom: 32px; }
        .form-section { background: #fff; border: 1.5px solid #bbb; border-radius: 12px; padding: 32px 28px; margin-bottom: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .form-label { font-size: 1.1em; font-weight: bold; margin-bottom: 8px; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 14px 12px; font-size: 1em; border: none; background: #eee; border-radius: 4px; margin-bottom: 24px; }
        .form-textarea { resize: vertical; min-height: 60px; }
        .action-bar { background: #111; color: #fff; text-align: center; padding: 0; margin: 36px 0 0 0; border-radius: 6px; overflow: hidden; }
        .action-bar button { width: 100%; background: none; color: #fff; border: none; font-size: 1.2em; font-weight: bold; padding: 16px 0; cursor: pointer; transition: background 0.2s; }
        .action-bar button:hover { background: #333; }
        @media (max-width: 800px) {
            .main { padding: 12px; }
            .form-section { padding: 18px 8px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="dashboard-title">欠席管理</span>
    </div>
    <div class="nav">
        <a href="/assets/dashboard.html">ダッシュボード</a>
        <a href="#">部員一覧</a>
        <a href="#">設定</a>
        <span style="margin-left:auto;">ユーザー名</span>
        <button>ログアウト</button>
    </div>
    <div class="main">
        <div class="form-title">遅刻・欠席登録</div>
        <div class="form-desc">遅刻または欠席情報を入力してください</div>
        <form class="form-section">
            <div class="form-label">遅刻または欠席</div>
            <select class="form-select" required>
                <option value="">遅刻か欠席か選択してください</option>
                <option value="late">遅刻</option>
                <option value="absent">欠席</option>
            </select>
            <div class="form-label">遅刻・欠席日</div>
            <input type="date" class="form-input" required placeholder="日程を選択してください">
            <div class="form-label">遅刻・欠席理由</div>
            <textarea class="form-textarea" required placeholder="欠席理由を詳細に記入してください"></textarea>
            <div class="action-bar">
                <button type="submit">遅刻・欠席登録</button>
            </div>
        </form>
    </div>
</body>
</html>
